{{- $needs := false -}}
{{- if or (eq .Section "posts") (eq .Section "gallery") (eq .Section "moments") (eq .Layout "moments") (eq .Layout "about") (eq .Layout "gallery-post") -}}
  {{- $needs = true -}}
{{- else if .Content -}}
  {{- if or (in .Content "<img") (in .Content "sakura-markdown-video") (in .Content "data-lightbox") -}}
    {{- $needs = true -}}
  {{- end -}}
{{- end -}}
{{- return $needs -}}
