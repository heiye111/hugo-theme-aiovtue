{{- $all := .Scratch.Get "footerLinksAll" | default slice -}}
{{- if gt (len $all) 0 -}}
<nav class="sakura-footer-links" id="sakura-footer-links" aria-label="友链">
  <ul class="sakura-footer-links__list">
    {{- range $all -}}
    <li><a href="{{ .url }}" target="_blank" rel="friend noopener">{{ .blog | default .name }}</a></li>
    {{- end -}}
  </ul>
</nav>
{{- end -}}
